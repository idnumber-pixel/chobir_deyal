/* CSS Variables for Theme */
:root {
    /* Light Mode Colors */

    --transition-fast: 0.15s ease;

    --transition-smooth: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

/* Dark Mode */

.gallery-item {

// ===========================================

// ===========================================

const AppState = {

    filteredPhotos: [],
    displayPhotos: [],
    renderedPhotos: [],
    currentPage: 1,

// ===========================================
// Utility Functions - Performance Optimized
// ===========================================

/**
 * Debounce function for performance
 */
function debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
        const later = () => {
            clearTimeout(timeout);
            func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
    };
}

/**
 * Throttle function
 */
function throttle(func, limit) {
    let inThrottle;
    return function (...args) {
        if (!inThrottle) {
            func.apply(this, args);
            inThrottle = true;
            setTimeout(() => inThrottle = false, limit);
        }
    };
}

/**
 * Request Idle Callback polyfill
 */
const requestIdleCallback = window.requestIdleCallback ||
    function (callback) {
        const start = Date.now();
        return setTimeout(() => {
            callback({
                didTimeout: false,
                timeRemaining: () => Math.max(0, 50 - (Date.now() - start))
            });
        }, 1);
    };

/**
 * Fisher-Yates Shuffle - O(n) complexity
 */
function fisherYatesShuffle(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

/**
 * Weighted Random Shuffle
 */
function weightedShuffle(array) {
    return array.map(item => ({
        item,
        weight: (item.clicks || 0) * 0.3 +
            (TABLE_CONFIG[item.tableName]?.weight || 1) * 10 +
            Math.random() * 50
    }))
        .sort((a, b) => b.weight - a.weight)
        .map(x => x.item);
}

/**
 * Table-Balanced Shuffle
 */
function tableBalancedShuffle(array) {
    const tables = {};

    array.forEach(item => {
        if (!tables[item.tableName]) {
            tables[item.tableName] = [];
        }
        tables[item.tableName].push(item);
    });

    Object.keys(tables).forEach(tableName => {
        tables[tableName] = fisherYatesShuffle(tables[tableName]);
    });

    const result = [];
    const tableNames = Object.keys(tables);
    let hasMore = true;
    let index = 0;

    while (hasMore) {
        hasMore = false;
        const shuffledTables = fisherYatesShuffle(tableNames);

        for (const tableName of shuffledTables) {
            if (tables[tableName][index]) {
                result.push(tables[tableName][index]);
                hasMore = true;
            }
        }
        index++;
    }

    return result;
}

/**
 * Personalized Shuffle - User Preference Based
 */
function personalizedShuffle(array) {
    const tables = {};

    array.forEach(item => {
        if (!tables[item.tableName]) {
            tables[item.tableName] = [];
        }
        tables[item.tableName].push(item);
    });

    Object.keys(tables).forEach(tableName => {
        tables[tableName] = fisherYatesShuffle(tables[tableName]);
    });

    const tableWeights = {};
    Object.keys(tables).forEach(tableName => {
        tableWeights[tableName] = getUserTableWeight(tableName);
    });

    const result = [];
    const tableNames = Object.keys(tables);
    let maxIterations = Math.max(...Object.values(tables).map(t => t.length));

    for (let round = 0; round < maxIterations; round++) {
        const weightedOrder = [];
        tableNames.forEach(tableName => {
            const weight = tableWeights[tableName];
            for (let w = 0; w < weight; w++) {
                weightedOrder.push(tableName);
            }
        });

        const shuffledWeightedOrder = fisherYatesShuffle(weightedOrder);
        const usedTables = new Set();

        for (const tableName of shuffledWeightedOrder) {
            if (!usedTables.has(tableName) && tables[tableName][round]) {
                result.push(tables[tableName][round]);
                usedTables.add(tableName);
            }
        }
    }

    return result;
}

/**
 * Smart Personalized Shuffle - Popular + User Preference
 */
function smartPersonalizedShuffle(array) {
    const sorted = [...array].sort((a, b) => (b.clicks || 0) - (a.clicks || 0));
    const popularCount = Math.floor(array.length * 0.15);
    const popular = sorted.slice(0, popularCount);
    const others = sorted.slice(popularCount);

    const topPreferred = getTopPreferredTables(3);
    const preferredTableNames = topPreferred.map(p => p.table);

    const userPreferredItems = others.filter(item =>
        preferredTableNames.includes(item.tableName)
    );
    const regularItems = others.filter(item =>
        !preferredTableNames.includes(item.tableName)
    );

    const extraPreferredCount = Math.floor(others.length * 0.25);
    const extraPreferred = fisherYatesShuffle(userPreferredItems).slice(0, extraPreferredCount);

    const remaining = [...userPreferredItems.slice(extraPreferredCount), ...regularItems];
    const personalizedRemaining = personalizedShuffle(remaining);

    const result = [];
    const popularShuffled = fisherYatesShuffle(popular);
    const extraShuffled = fisherYatesShuffle(extraPreferred);

    const popularInterval = Math.floor(personalizedRemaining.length / popularShuffled.length) || 1;
    const preferredInterval = Math.floor(personalizedRemaining.length / extraShuffled.length) || 1;

    let popularIndex = 0;
    let preferredIndex = 0;

    for (let i = 0; i < personalizedRemaining.length; i++) {
        if (i % popularInterval === 0 && popularIndex < popularShuffled.length) {
            result.push(popularShuffled[popularIndex++]);
        }
        if (i % preferredInterval === Math.floor(preferredInterval / 2) && preferredIndex < extraShuffled.length) {
            result.push(extraShuffled[preferredIndex++]);
        }
        result.push(personalizedRemaining[i]);
    }

    while (popularIndex < popularShuffled.length) {
        result.push(popularShuffled[popularIndex++]);
    }
    while (preferredIndex < extraShuffled.length) {
        result.push(extraShuffled[preferredIndex++]);
    }

    return result;
}

// ===========================================
// User Preferences (Device-Based)
// ===========================================

function loadUserPreferences() {
    try {
        const stored = localStorage.getItem('chobirdeyal_preferences');
        if (stored) {
            const prefs = JSON.parse(stored);
            AppState.userPreferences = prefs.tableClicks || {};

            if (prefs.seenPhotos && Array.isArray(prefs.seenPhotos)) {
                AppState.seenPhotos = new Set(prefs.seenPhotos);
            }

            // Load theme
            if (prefs.theme) {
                AppState.theme = prefs.theme;
            }

            if (prefs.clickCounts) {
                AppState.clickCounts = prefs.clickCounts;
            }

            return AppState.userPreferences;
        }
    } catch (error) {
        console.warn('Failed to load preferences:', error);
    }
    return {};
}

function saveUserPreferences() {
    try {
        const prefs = {
            tableClicks: AppState.userPreferences,
            clickCounts: AppState.clickCounts,
            seenPhotos: Array.from(AppState.seenPhotos),
            theme: AppState.theme,
            lastUpdated: Date.now()
        };
        localStorage.setItem('chobirdeyal_preferences', JSON.stringify(prefs));
    } catch (error) {
        console.warn('Failed to save preferences:', error);
    }
}

function trackUserTableClick(tableName) {
    if (!tableName) return;
    AppState.userPreferences[tableName] = (AppState.userPreferences[tableName] || 0) + 1;
    saveUserPreferences();
}

function getUserTableWeight(tableName) {
    const clicks = AppState.userPreferences[tableName] || 0;
    if (clicks === 0) return 1;
    if (clicks < 5) return 1.2;
    if (clicks < 10) return 1.5;
    if (clicks < 20) return 2;
    if (clicks < 50) return 3;
    return 5;
}

function getTopPreferredTables(limit = 5) {
    return Object.entries(AppState.userPreferences)
        .sort((a, b) => b[1] - a[1])
        .slice(0, limit)
        .map(([table, count]) => ({ table, count, weight: getUserTableWeight(table) }));
}

// ===========================================
// Seen Photos Management
// ===========================================

function markPhotosAsSeen(photos) {
    photos.forEach(photo => {
        AppState.seenPhotos.add(photo.table_image_iid);
    });
    // Debounced save
    requestIdleCallback(() => saveUserPreferences());
}

function filterUnseenPhotos(photos) {
    const unseen = photos.filter(photo => !AppState.seenPhotos.has(photo.table_image_iid));

    if (unseen.length === 0 && photos.length > 0) {
        AppState.seenPhotos.clear();
        requestIdleCallback(() => saveUserPreferences());
        return photos;
    }

    return unseen;
}

function resetSeenPhotos() {
    AppState.seenPhotos.clear();
    saveUserPreferences();
}

// ===========================================
// Theme Management
// ===========================================

function initTheme() {
    const savedTheme = AppState.theme;
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme = savedTheme || (prefersDark ? 'dark' : 'light');
    setTheme(theme);
}

function setTheme(theme) {
    AppState.theme = theme;
    document.documentElement.setAttribute('data-theme', theme);
    saveUserPreferences();

    const themeToggle = document.getElementById('themeToggle');
    if (themeToggle) {
        themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    }
}

function toggleTheme() {
    const newTheme = AppState.theme === 'dark' ? 'light' : 'dark';
    setTheme(newTheme);
}

// ===========================================
// Image Handling - Performance Optimized
// ===========================================

function sanitizeImageUrl(url) {
    if (!url || typeof url !== 'string') return url;
    
    url = url.split('#')[0].trim();
    if (url.toLowerCase() === 'image_url') return ''; // Reject header string

    url = url.replace(/i\.ibb\.co\.com/g, 'i.ibb.co');
    url = url.replace(/\.com\.com/g, '.com');
    url = url.replace(/([^:])\/\/+/g, '$1/');

    if (url.startsWith('//')) {
        url = 'https:' + url;
    } else if (url.startsWith('http://')) {
        url = url.replace('http://', 'https://');
    }

    return url;
}

/**
 * Preload images for next pages
 */
function preloadNextPages() {
    const currentEnd = AppState.currentPage * CONFIG.ITEMS_PER_PAGE;
    const preloadEnd = Math.min(
        currentEnd + (CONFIG.PRELOAD_PAGES * CONFIG.ITEMS_PER_PAGE),
        AppState.displayPhotos.length
    );

    for (let i = currentEnd; i < preloadEnd; i++) {
        const photo = AppState.displayPhotos[i];
        if (photo && !AppState.preloadedImages.has(photo.thumbnail_url)) {
            const img = new Image();
            img.src = photo.thumbnail_url;
            AppState.preloadedImages.add(photo.thumbnail_url);
        }
    }
}

/**
 * Create intersection observer for lazy loading
 */
function createImageObserver() {
    if (AppState.observers.image) {
        AppState.observers.image.disconnect();
    }

    AppState.observers.image = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const img = entry.target;
                const src = img.dataset.src;

                if (src) {
                    img.src = src;
                    img.removeAttribute('data-src');
                    // class management is now handled by onload and initial tags
                }

                AppState.observers.image.unobserve(img);
            }
        });
    }, {
        root: document.getElementById('scrollArea'),
        rootMargin: '400px',
        threshold: 0.01
    });
}

// New data loader that reads CSV files from the `asset_link` folder.
// Thumbnail CSV (no header) is used for display; main CSV (has header)
// is used for download URLs. URLs are matched by the filename portion
// after the last "/" (e.g., "/a23-112.jpg").
async function fetchTableData(tableName) {
    const csvPath = `asset_link/${tableName}.csv`;
    const tableConfig = TABLE_CONFIG[tableName];
    const thumbnailFile = tableConfig?.thumbnailFile;

    try {
        // --- Load main CSV (full-resolution download URLs) ---
        const res = await fetch(csvPath);
        if (!res.ok) {
            console.warn(`Unable to load ${csvPath}: ${res.status}`);
            return [];
        }
        const text = await res.text();
        const lines = text.trim().split('\n');
        if (lines.length <= 1) return [];

        // First line is header – skip it; build a map keyed by "/filename"
        const fullUrlMap = new Map();
        const dataLines = lines.slice(1);
        dataLines.forEach(line => {
            const url = sanitizeImageUrl(line.trim());
            if (url) {
                const key = '/' + url.split('/').pop().split('?')[0];
                fullUrlMap.set(key, url);
            }
        });

        // --- Load thumbnail CSV (display URLs, no header row) ---
        let thumbnailUrls = null;
        if (thumbnailFile) {
            try {
                const thumbRes = await fetch(`asset_link/${thumbnailFile}.csv`);
                if (thumbRes.ok) {
                    const thumbText = await thumbRes.text();
                    thumbnailUrls = thumbText.trim().split('\n')
                        .map(l => sanitizeImageUrl(l.trim()))
                        .filter(Boolean);
                }
            } catch (e) {
                console.warn(`Failed to load thumbnail CSV for ${tableName}:`, e);
            }
        }

        // --- Build photo objects ---
        if (thumbnailUrls && thumbnailUrls.length > 0) {
            // Thumbnails come first; match each thumbnail to its full URL
            // by comparing the filename after the last "/"
            return thumbnailUrls.map((thumbUrl, idx) => {
                const key = '/' + thumbUrl.split('/').pop().split('?')[0];
                const fullUrl = fullUrlMap.get(key) || thumbUrl; // fallback to thumb if no match
                const imageIid = idx + 1;
                const tableImageIid = `${tableName}-${imageIid}`;
                const countData = AppState.clickCounts[tableImageIid];

                return {
                    id: imageIid,
                    image_url: fullUrl,       // used for download
                    thumbnail_url: thumbUrl,  // used for display
                    image_iid: imageIid,
                    table_image_iid: tableImageIid,
                    tableName: tableName,
                    categoryName: tableConfig?.name || tableName,
                    category: tableConfig?.category || 'other',
                    weight: tableConfig?.weight || 1,
                    clicks: typeof countData === 'object' ? (countData.clicks || 0) : (countData || 0),
                    views: typeof countData === 'object' ? (countData.views || 0) : 0
                };
            }).filter(item => item.thumbnail_url);
        }

        // Fallback: no thumbnail CSV – use main CSV URLs for both
        return dataLines.map((line, idx) => {
            const imageUrl = sanitizeImageUrl(line.trim());
            const imageIid = idx + 1;
            const tableImageIid = `${tableName}-${imageIid}`;
            const countData = AppState.clickCounts[tableImageIid];

            return {
                id: imageIid,
                image_url: imageUrl,
                thumbnail_url: imageUrl,
                image_iid: imageIid,
                table_image_iid: tableImageIid,
                tableName: tableName,
                categoryName: tableConfig?.name || tableName,
                category: tableConfig?.category || 'other',
                weight: tableConfig?.weight || 1,
                clicks: typeof countData === 'object' ? (countData.clicks || 0) : (countData || 0),
                views: typeof countData === 'object' ? (countData.views || 0) : 0
            };
        }).filter(item => item.image_url);
    } catch (error) {
        console.warn(`Fetch ${tableName} error:`, error);
        return [];
    }
}

// --- Supabase Data Fetcher ---
async function fetchSupabaseData() {
    try {
        const response = await fetch(`${SUPABASE_CONFIG.url}/rest/v1/${SUPABASE_CONFIG.table}?select=*`, {
            headers: {
                'apikey': SUPABASE_CONFIG.key,
                'Authorization': `Bearer ${SUPABASE_CONFIG.key}`
            }
        });

        if (!response.ok) {
            console.warn('Supabase fetch failed:', response.status);
            return [];
        }

        const data = await response.json();
        console.log('Supabase raw items:', data.length);
        if (data.length > 0) console.log('Supabase first item sample:', data[0]);
        const validCategories = ['kolkata', 'poses', 'photography'];

        return data.map(item => {
            const section = (item.section || '').toLowerCase().trim();
            const category = validCategories.includes(section) ? section : 'others';
            
            // Priority: thumbnail_url > image_url
            const thumbUrl = sanitizeImageUrl(item.thumbnail_url || item.image_url);
            const fullUrl = sanitizeImageUrl(item.image_url || item.thumbnail_url);
            
            const tableImageIid = `supabase-${item.image_iid}`;
            const countData = AppState.clickCounts[tableImageIid];

            return {
                id: item.image_iid,
                image_url: fullUrl,
                thumbnail_url: thumbUrl,
                image_iid: item.image_iid,
                table_image_iid: tableImageIid,
                tableName: 'supabase',
                categoryName: section || 'Others',
                category: category,
                weight: 1.2,
                clicks: typeof countData === 'object' ? (countData.clicks || 0) : (countData || 0),
                views: typeof countData === 'object' ? (countData.views || 0) : 0
            };
        }).filter(item => item.thumbnail_url);
    } catch (error) {
        console.error('Supabase error:', error);
        return [];
    }
}

async function loadAllPhotos() {
    // Check cache
    if (AppState.cache.data &&
        AppState.cache.timestamp &&
        Date.now() - AppState.cache.timestamp < CONFIG.CACHE_DURATION) {
        console.log('📦 Using cached data');
        return AppState.cache.data;
    }

    AppState.isLoading = true;
    showLoadingState();

    try {
        // Fetch from all CSV tables
        const csvPromises = Object.keys(TABLE_CONFIG).map(tableName =>
            fetchTableData(tableName)
        );

        // Fetch from Supabase
        const supabasePromise = fetchSupabaseData();

        const [results, supabaseData] = await Promise.all([
            Promise.all(csvPromises),
            supabasePromise
        ]);

        const combined = [...results.flat(), ...supabaseData];

        // deduplicate by image_url
        const seen = new Set();
        const allPhotos = [];
        combined.forEach(photo => {
            if (photo && photo.image_url && !seen.has(photo.image_url)) {
                seen.add(photo.image_url);
                allPhotos.push(photo);
            }
        });

        AppState.cache.data = allPhotos;
        AppState.cache.timestamp = Date.now();

        console.log(`📊 Loaded ${allPhotos.length} photos (${supabaseData.length} from Supabase)`);

        return allPhotos;

    } catch (error) {
        console.error('Load error:', error);
        return [];
    } finally {
        AppState.isLoading = false;
        hideLoadingState();
    }
}

// ===========================================
// Shuffle Algorithms
// ===========================================

const SHUFFLE_ALGORITHMS = {
    random: (arr) => fisherYatesShuffle(arr),
    popularity: (arr) => weightedShuffle(arr),
    tableBalanced: (arr) => tableBalancedShuffle(arr),
    personalized: (arr) => personalizedShuffle(arr),
    smartPersonalized: (arr) => smartPersonalizedShuffle(arr)
};

function shufflePhotos(algorithm = 'smartPersonalized') {
    const shuffleFn = SHUFFLE_ALGORITHMS[algorithm] || SHUFFLE_ALGORITHMS.smartPersonalized;
    const baseShuffled = shuffleFn(AppState.filteredPhotos);

    // Favorites repetition logic
    const favorites = [...AppState.allPhotos]
        .sort((a, b) => (b.clicks || 0) - (a.clicks || 0))
        .slice(0, 50);

    // Store the full sequence
    AppState.fullPhotoSequence = [...baseShuffled, ...favorites];

    // Reset paging
    AppState.currentPage = 1;
    AppState.lastShuffleTime = Date.now();

    return AppState.fullPhotoSequence;
}

// ===========================================
// Filtering
// ===========================================

function filterByCategory(category) {
    AppState.currentCategory = category;

    if (category === 'all') {
        AppState.filteredPhotos = [...AppState.allPhotos];
        shufflePhotos('smartPersonalized');
    } else if (category === 'popular') {
        const allByPopularity = [...AppState.allPhotos].sort((a, b) => {
            return (b.clicks || 0) - (a.clicks || 0);
        });
        AppState.filteredPhotos = allByPopularity;
        AppState.fullPhotoSequence = allByPopularity;
    } else {
        AppState.filteredPhotos = AppState.allPhotos.filter(
            photo => photo.category === category
        );
        shufflePhotos('personalized');
    }

    AppState.currentPage = 1;
    AppState.renderedPhotos = [];
    AppState.loadedCount = 0;
    AppState.hasMorePhotos = true;

    return AppState.filteredPhotos;
}

// ===========================================
// Pagination
// ===========================================

function getPagePhotos(page = 1) {
    const startIndex = (page - 1) * CONFIG.ITEMS_PER_PAGE;
    const endIndex = startIndex + CONFIG.ITEMS_PER_PAGE;
    return AppState.fullPhotoSequence.slice(startIndex, endIndex);
}

function getTotalPages() {
    return Math.ceil(AppState.fullPhotoSequence.length / CONFIG.ITEMS_PER_PAGE);
}

function goToPage(page) {
    const totalPages = getTotalPages();
    if (page < 1) page = 1;
    if (page > totalPages) page = totalPages;
    AppState.currentPage = page;

    // Preload next pages
    requestIdleCallback(() => preloadNextPages());

    return getPagePhotos(page);
}

function nextPage() {
    return goToPage(AppState.currentPage + 1);
}

function prevPage() {
    return goToPage(AppState.currentPage - 1);
}

// ===========================================
// Click/View Tracking
// ===========================================

function trackClick(tableName, photoId, tableImageIid) {
    if (!tableName || !photoId || !tableImageIid) return;

    const countData = AppState.clickCounts[tableImageIid];
    if (typeof countData === 'object') {
        countData.clicks = (countData.clicks || 0) + 1;
    } else {
        AppState.clickCounts[tableImageIid] = { clicks: (countData || 0) + 1, views: 0 };
    }

    // Update the clicks property on the actual photo object in allPhotos
    const photo = AppState.allPhotos.find(p => p.table_image_iid === tableImageIid);
    if (photo) {
        photo.clicks = (photo.clicks || 0) + 1;
    }

    // Persist to localStorage
    saveUserPreferences();

    const currentCount = AppState.trackingQueue.clicks.get(tableImageIid) || 0;
    AppState.trackingQueue.clicks.set(tableImageIid, currentCount + 1);

    if (!AppState.trackingQueue.clicks.has(`${tableImageIid}_meta`)) {
        AppState.trackingQueue.clicks.set(`${tableImageIid}_meta`, { tableName, photoId, tableImageIid });
    }

    startBatchTimer();
}

function trackView(tableName, photoId, tableImageIid) {
    if (!tableName || !photoId || !tableImageIid) return;

    const currentCount = AppState.trackingQueue.views.get(tableImageIid) || 0;
    AppState.trackingQueue.views.set(tableImageIid, currentCount + 1);

    if (!AppState.trackingQueue.views.has(`${tableImageIid}_meta`)) {
        AppState.trackingQueue.views.set(`${tableImageIid}_meta`, { tableName, photoId, tableImageIid });
    }

    startBatchTimer();
}

// ===========================================
// Batch Tracking System
// ===========================================

function startBatchTimer() {
    if (AppState.trackingTimer) return;

    AppState.trackingTimer = setInterval(() => {
        requestIdleCallback(() => processBatchTracking());
    }, CONFIG.BATCH_TRACKING_INTERVAL);
}

function stopBatchTimer() {
    if (AppState.trackingTimer) {
        clearInterval(AppState.trackingTimer);
        AppState.trackingTimer = null;
    }
}

async function processBatchTracking() {
    const hasViews = AppState.trackingQueue.views.size > 0;
    const hasClicks = AppState.trackingQueue.clicks.size > 0;

    if (!hasViews && !hasClicks) return;

    try {
        const photoUpdates = new Map();

        for (const [key, value] of AppState.trackingQueue.views) {
            if (key.endsWith('_meta')) {
                const meta = value;
                const count = AppState.trackingQueue.views.get(meta.tableImageIid) || 0;

                if (!photoUpdates.has(meta.tableImageIid)) {
                    photoUpdates.set(meta.tableImageIid, {
                        tableName: meta.tableName,
                        photoId: meta.photoId,
                        tableImageIid: meta.tableImageIid,
                        viewIncrement: 0,
                        clickIncrement: 0
                    });
                }
                photoUpdates.get(meta.tableImageIid).viewIncrement = count;
            }
        }

        for (const [key, value] of AppState.trackingQueue.clicks) {
            if (key.endsWith('_meta')) {
                const meta = value;
                const count = AppState.trackingQueue.clicks.get(meta.tableImageIid) || 0;

                if (!photoUpdates.has(meta.tableImageIid)) {
                    photoUpdates.set(meta.tableImageIid, {
                        tableName: meta.tableName,
                        photoId: meta.photoId,
                        tableImageIid: meta.tableImageIid,
                        viewIncrement: 0,
                        clickIncrement: 0
                    });
                }
                photoUpdates.get(meta.tableImageIid).clickIncrement = count;
            }
        }

        for (const [tableImageIid, update] of photoUpdates) {
            await updatePhotoTracking(update);
        }

        AppState.trackingQueue.views.clear();
        AppState.trackingQueue.clicks.clear();

    } catch (error) {
        console.error('Batch tracking error:', error);
    }
}

    const stats = document.getElementById('stats');

        const totalPages = getTotalPages();
        const totalInDb = AppState.allPhotos.length;
        const seenCount = AppState.seenPhotos.size;

        stats.innerHTML = `

    const totalPages = getTotalPages();
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const pageInfo = document.getElementById('pageInfo');

    if (prevBtn) prevBtn.disabled = AppState.currentPage === 1;
    if (nextBtn) nextBtn.disabled = AppState.currentPage === totalPages || totalPages === 0;
    if (pageInfo) pageInfo.textContent = `Page ${AppState.currentPage} / ${totalPages || 1}`;
}

// ===========================================
// Infinite Scroll Logic (Standard)
// ===========================================

function setupInfiniteScroll() {
    const sentinel = document.getElementById('loadingSentinel');
    if (!sentinel) return;

    if (AppState.observers.scroll) {
        AppState.observers.scroll.disconnect();
    }

    AppState.observers.scroll = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting && !AppState.isLoadingMore) {
                loadMorePhotos();
            }
        });
    }, {
        root: null, // viewport
        rootMargin: '400px',
        threshold: 0.1
    });

    AppState.observers.scroll.observe(sentinel);
}

function loadMorePhotos() {
    if (AppState.isLoadingMore) return;

    // Check if we reached the end of the full sequence
    const nextChunkIndex = AppState.currentChunkIndex + 1;
    const start = nextChunkIndex * CONFIG.ITEMS_PER_PAGE;

    // If start is beyond total photos
    if (start >= AppState.fullPhotoSequence.length) {
        return;
    }

    AppState.isLoadingMore = true;
    const sentinel = document.getElementById('loadingSentinel');
    if (sentinel) sentinel.classList.add('active');

    const end = start + CONFIG.ITEMS_PER_PAGE;
    const newPhotos = AppState.fullPhotoSequence.slice(start, end);

    if (newPhotos.length > 0) {
        console.log(`📥 Loading chunk ${nextChunkIndex + 1} (${newPhotos.length} photos)`);

        // Append to state
        AppState.displayPhotos = [...AppState.displayPhotos, ...newPhotos];
        AppState.currentChunkIndex = nextChunkIndex;

        // Render 
        appendGalleryItems(newPhotos);

        // Update stats
        updateStats();
    }

    // Delay to prevent rapid firing
    setTimeout(() => {
        AppState.isLoadingMore = false;
        if (sentinel) sentinel.classList.remove('active');
    }, 500);
}

function appendGalleryItems(photos) {
    const gallery = document.getElementById('gallery');
    if (!gallery) return;

    // We can use a DocumentFragment for performance
    const fragment = document.createDocumentFragment();
    const currentCount = (AppState.currentPage - 1) * CONFIG.ITEMS_PER_PAGE; // offset based on page

    photos.forEach((photo, i) => {
        const item = createGalleryItem(photo, i);
        fragment.appendChild(item);
    });

    gallery.appendChild(fragment);

    // Setup observers for new items
    const newItems = gallery.querySelectorAll('.gallery-item:not([data-observed])');
    newItems.forEach(item => {
        item.dataset.observed = 'true';
        const img = item.querySelector('img');
        if (img && AppState.observers.image) {
            AppState.observers.image.observe(img);
        }
    });
    setupViewTracking(newItems);
}

function createGalleryItem(photo, index) {
    const div = document.createElement('div');
    div.className = 'gallery-item item-skeleton';
    div.dataset.table = photo.tableName;
    div.dataset.id = photo.id;
    div.dataset.iid = photo.table_image_iid;
    div.dataset.thumbnail = photo.thumbnail_url;
    div.dataset.fullurl = photo.image_url;
    div.dataset.viewed = "false";
    div.dataset.index = index;

    div.innerHTML = `
        <img data-src="${photo.thumbnail_url}" 
             src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'%3E%3C/svg%3E"
             alt="${photo.categoryName}"
             class="loading"
             crossorigin="anonymous">
        <div class="item-info">
            <div class="category-name">${photo.categoryName}</div>
            <div class="item-meta">
                <span class="view-count">👁️ ${photo.views || 0}</span>
                <span class="click-count">❤️ ${photo.clicks || 0}</span>
            </div>
        </div>
    `;

    // Add load listener
    const img = div.querySelector('img');
    img.onload = function () {
        if (this.src && !this.src.startsWith('data:')) {
            this.classList.add('loaded');
            div.classList.remove('item-skeleton');
        }
    };

    div.addEventListener('click', () => {
        openModal(photo.thumbnail_url, photo.image_url, photo.tableName, photo.id, photo.table_image_iid, index);
    });

    return div;
}

function loadMorePhotos() {
    if (AppState.isLoadingMore) return;

    const nextChunkIndex = AppState.currentChunkIndex + 1;
    const start = nextChunkIndex * CONFIG.ITEMS_PER_PAGE;
    const end = start + CONFIG.ITEMS_PER_PAGE;

    if (start >= AppState.fullPhotoSequence.length) return; // End of list

    AppState.isLoadingMore = true;

    const newPhotos = AppState.fullPhotoSequence.slice(start, end);
    if (newPhotos.length > 0) {
        console.log(`📥 Loading chunk ${nextChunkIndex + 1} (${newPhotos.length} photos)`);

        // Append to state
        AppState.displayPhotos = [...AppState.displayPhotos, ...newPhotos];
        AppState.currentChunkIndex = nextChunkIndex;

        // Generate HTML
        const htmlRows = generateHtmlRows(newPhotos, start);

        // Append to Clusterize
        AppState.clusterize.append(htmlRows);

        // Update stats
        updateStats();
    }

    // Simple debounce/delay
    setTimeout(() => {
        AppState.isLoadingMore = false;
    }, 500);
}

function generateHtmlRows(photos, startIndex = 0) {
    return photos.map((photo, i) => {
        const index = startIndex + i;
        return `
            <div class="gallery-item item-skeleton" 
                 data-table="${photo.tableName}"
                 data-id="${photo.id}"
                 data-iid="${photo.table_image_iid}"
                 data-thumbnail="${photo.thumbnail_url}"
                 data-fullurl="${photo.image_url}"
                 data-viewed="false"
                 data-index="${index}">
                <img data-src="${photo.thumbnail_url}" 
                     src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'%3E%3C/svg%3E"
                     alt="${photo.categoryName}"
                     class="loading"
                     crossorigin="anonymous"
                     onload="if(this.src && !this.src.startsWith('data:')) { this.classList.add('loaded'); this.parentElement.classList.remove('item-skeleton'); }">
                <div class="item-info">
                    <div class="category-name">${photo.categoryName}</div>
                    <div class="item-meta">
                        <span class="view-count">👁️ ${photo.views || 0}</span>
                        <span class="click-count">❤️ ${photo.clicks || 0}</span>
                    </div>
                </div>
            </div>
        `;
    });
}

function renderGallery() {
    const gallery = document.getElementById('gallery');
    const sentinel = document.getElementById('loadingSentinel');
    if (!gallery) return;

    // Hide infinite scroll sentinel since we are using buttons
    if (sentinel) sentinel.style.display = 'none';

    // Clean up Clusterize if needed
    if (AppState.clusterize) {
        try { AppState.clusterize.destroy(); } catch (e) { }
        AppState.clusterize = null;
    }

    const start = (AppState.currentPage - 1) * CONFIG.ITEMS_PER_PAGE;
    const end = start + CONFIG.ITEMS_PER_PAGE;
    const currentPhotos = AppState.fullPhotoSequence.slice(start, end);

    if (currentPhotos.length === 0) {
        gallery.innerHTML = '<div class="loading">No photos found</div>';
        updatePaginationUI();
        return;
    }

    // Reset Gallery
    gallery.innerHTML = '';

    // Append Current Page Photos
    appendGalleryItems(currentPhotos);

    AppState.displayPhotos = currentPhotos; // Set displayPhotos to current chunk for modal navigation
    AppState.renderedPhotos = currentPhotos;
    AppState.loadedCount = currentPhotos.length;

    updateStats();
    updatePaginationUI();
}

// ===========================================
// Modal - Enhanced with Navigation
// ===========================================

function openModal(thumbnailUrl, fullUrl, tableName, photoId, tableImageIid, photoIndex) {
    const modal = document.getElementById('modal');
    const modalImage = document.getElementById('modalImage');
    const downloadBtn = document.getElementById('downloadBtn');
    const shareBtn = document.getElementById('shareBtn');
    const photoCounter = document.getElementById('photoCounter');

    if (modal && modalImage) {
        AppState.currentModalIndex = photoIndex;

        const cleanThumbnail = sanitizeImageUrl(thumbnailUrl);
        const cleanFull = sanitizeImageUrl(fullUrl || thumbnailUrl);

        modalImage.src = cleanThumbnail;
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';

        if (downloadBtn) {
            downloadBtn.dataset.imageUrl = cleanFull;
        }

        if (shareBtn) {
            const currentPhoto = AppState.displayPhotos[photoIndex];
            shareBtn.dataset.tableName = tableName;
            shareBtn.dataset.photoId = currentPhoto ? currentPhoto.image_iid : photoId;
        }

        if (photoCounter) {
            photoCounter.textContent = `${photoIndex + 1} / ${AppState.displayPhotos.length}`;
        }

        trackClick(tableName, photoId, tableImageIid);
        trackUserTableClick(tableName);

        // Preload adjacent images
        preloadAdjacentImages(photoIndex);
    }
}

function closeModal() {
    const modal = document.getElementById('modal');
    if (modal) {
        modal.classList.remove('active');
        document.body.style.overflow = '';
        AppState.currentModalIndex = -1;
    }
}

function navigateModal(direction) {
    const newIndex = AppState.currentModalIndex + direction;

    if (newIndex >= 0 && newIndex < AppState.displayPhotos.length) {
        const photo = AppState.displayPhotos[newIndex];
        openModal(
            photo.thumbnail_url,
            photo.image_url,
            photo.tableName,
            photo.id,
            photo.table_image_iid,
            newIndex
        );
    }
}

function preloadAdjacentImages(currentIndex) {
    const indices = [currentIndex - 1, currentIndex + 1];

    indices.forEach(index => {
        if (index >= 0 && index < AppState.displayPhotos.length) {
            const photo = AppState.displayPhotos[index];
            if (!AppState.preloadedImages.has(photo.image_url)) {
                const img = new Image();
                img.src = photo.image_url;
                AppState.preloadedImages.add(photo.image_url);
            }
        }
    });
}

// ===========================================
// Download Function
// ===========================================

async function downloadImage() {
    const downloadBtn = document.getElementById('downloadBtn');

    if (!downloadBtn || !downloadBtn.dataset.imageUrl) {
        alert('Image URL not found. Please try again.');
        return;
    }

    const imageUrl = downloadBtn.dataset.imageUrl;
    const originalText = downloadBtn.innerHTML;

    try {
        downloadBtn.disabled = true;
        downloadBtn.innerHTML = '<span>⏳</span><span>Downloading...</span>';

        const urlPath = new URL(imageUrl).pathname;
        let filename = urlPath.split('/').pop() || `chobirdeyal_${Date.now()}.jpg`;
        filename = filename.split('?')[0];
        if (!filename.match(/\.(jpg|jpeg|png|webp|gif)$/i)) {
            filename += '.jpg';
        }

        try {
            const response = await fetch(imageUrl);
            if (!response.ok) throw new Error('Fetch failed');

            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);

            const link = document.createElement('a');
            link.href = blobUrl;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);

        } catch (fetchError) {
            const link = document.createElement('a');
            link.href = imageUrl;
            link.download = filename;
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        downloadBtn.innerHTML = '<span>✅</span><span>Done!</span>';

        setTimeout(() => {
            downloadBtn.disabled = false;
            downloadBtn.innerHTML = originalText;
        }, 2000);

    } catch (error) {
        window.open(imageUrl, '_blank');
        downloadBtn.innerHTML = '<span>🔗</span><span>Opened</span>';
        setTimeout(() => {
            downloadBtn.disabled = false;
            downloadBtn.innerHTML = originalText;
        }, 2000);
    }
}

// ===========================================
// Share Function
// ===========================================

async function shareImage() {
    const shareBtn = document.getElementById('shareBtn');
    if (!shareBtn) return;

    const tableName = shareBtn.dataset.tableName;
    const photoId = shareBtn.dataset.photoId;

    if (!tableName || !photoId) return;

    // Construct request URL format: ?tableName=image_iid
    const url = new URL(window.location.origin + window.location.pathname);
    url.searchParams.set(tableName, photoId);
    const shareUrl = url.toString();

    try {
        if (navigator.share) {
            await navigator.share({
                title: 'Chobir Deyal Photo',
                text: 'Check out this photo!',
                url: shareUrl
            });
        } else {
            await navigator.clipboard.writeText(shareUrl);
            alert(`Link copied: ${shareUrl}`);
        }
    } catch (error) {
        console.warn('Share failed, falling back to clipboard:', error);
        try {
            await navigator.clipboard.writeText(shareUrl);
            alert(`Link copied: ${shareUrl}`);
        } catch (clipboardError) {
            console.error('Clipboard failed:', clipboardError);
        }
    }
}

// ===========================================
// Scroll to Top
// ===========================================

function setupScrollToTop() {
    const scrollBtn = document.getElementById('scrollTopBtn');
    if (!scrollBtn) return;

    const handleScroll = throttle(() => {
        if (window.scrollY > 500) {
            scrollBtn.classList.add('visible');
        } else {
            scrollBtn.classList.remove('visible');
        }
    }, 100);

    window.addEventListener('scroll', handleScroll);

    scrollBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
}

// ===========================================
// View Tracking Observer
// ===========================================

function setupViewTracking(items) {
    if (AppState.observers.view) {
        AppState.observers.view.disconnect();
    }

    AppState.observers.view = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const item = entry.target;

                if (item.dataset.viewed === 'false') {
                    const tableName = item.dataset.table;
                    const photoId = item.dataset.id;
                    const tableImageIid = item.dataset.iid;

                    item.dataset.viewed = 'true';
                    trackView(tableName, photoId, tableImageIid);

                    const viewCountElement = item.querySelector('.view-count');
                    if (viewCountElement) {
                        const currentCount = parseInt(viewCountElement.textContent.replace(/[^0-9]/g, '')) || 0;
                        viewCountElement.textContent = `👁️ ${currentCount + 1}`;
                    }

                    AppState.observers.view.unobserve(item);
                }
            }
        });
    }, {
        threshold: 0.5,
        rootMargin: '0px'
    });

    items.forEach(item => {
        if (item.dataset.viewed === 'false') {
            AppState.observers.view.observe(item);
        }
    });
}

function setupFilters() {
    const filterBtns = document.querySelectorAll('.filter-btn');

    filterBtns.forEach(btn => {
        btn.addEventListener('click', function () {
            filterBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');

            const category = this.dataset.category;
            filterByCategory(category);

            showSkeletonLoaders();
            requestAnimationFrame(() => {
                renderGallery();
            });
        });
    });
}

function setupPagination() {
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    if (prevBtn) {
        prevBtn.addEventListener('click', () => {
            prevPage();
            AppState.renderedPhotos = [];
            AppState.loadedCount = 0;

            showSkeletonLoaders();
            requestAnimationFrame(() => {
                renderGallery();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });
    }

    if (nextBtn) {
        nextBtn.addEventListener('click', () => {
            nextPage();
            AppState.renderedPhotos = [];
            AppState.loadedCount = 0;

            showSkeletonLoaders();
            requestAnimationFrame(() => {
                renderGallery();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });
    }
}

function setupModal() {
    const modal = document.getElementById('modal');
    const closeBtn = document.getElementById('closeModal');
    const downloadBtn = document.getElementById('downloadBtn');
    const shareBtn = document.getElementById('shareBtn');
    const prevNav = document.getElementById('modalPrev');
    const nextNav = document.getElementById('modalNext');

    if (closeBtn) {
        closeBtn.addEventListener('click', closeModal);
    }

    if (downloadBtn) {
        downloadBtn.addEventListener('click', downloadImage);
    }

    if (shareBtn) {
        shareBtn.addEventListener('click', shareImage);
    }

    if (prevNav) {
        prevNav.addEventListener('click', (e) => {
            e.stopPropagation();
            navigateModal(-1);
        });
    }

    if (nextNav) {
        nextNav.addEventListener('click', (e) => {
            e.stopPropagation();
            navigateModal(1);
        });
    }

    if (modal) {
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
        if (AppState.currentModalIndex === -1) return;

        switch (e.key) {
            case 'Escape':
                closeModal();
                break;
            case 'ArrowLeft':
                navigateModal(-1);
                break;
            case 'ArrowRight':
                navigateModal(1);
                break;
        }
    });

    // Touch swipe support
    let touchStartX = 0;
    let touchEndX = 0;

    if (modal) {
        modal.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        modal.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });
    }

    function handleSwipe() {
        const diff = touchStartX - touchEndX;
        if (Math.abs(diff) > 50) {
            if (diff > 0) {
                navigateModal(1);
            } else {
                navigateModal(-1);
            }
        }
    }
}

function setupThemeToggle() {
    const themeToggle = document.getElementById('themeToggle');
    if (themeToggle) {
        themeToggle.addEventListener('click', toggleTheme);
    }
}

async function initGallery() {
    console.log('🎨 Initializing Chobir Deyal...');

    // Load preferences
    loadUserPreferences();

    // Initialize theme
    initTheme();

    // Create image observer
    createImageObserver();

    // Show skeleton loaders
    showSkeletonLoaders();

    // Load data
    AppState.allPhotos = await loadAllPhotos();
    AppState.filteredPhotos = [...AppState.allPhotos];

    // Shuffle
    shufflePhotos('smartPersonalized');

    // Render
    renderGallery();

    // Real-time not used (data loaded from CSV)

    // Setup UI
    setupFilters();
    setupPagination();
    setupModal();
    setupThemeToggle();
    setupScrollToTop();

    // Check for deep links
    handleDeepLink();

    console.log('✅ Gallery initialized!');
}

function handleDeepLink() {
    const urlParams = new URLSearchParams(window.location.search);

    // Check if any known table name exists in query params
    const tableNames = Object.keys(TABLE_CONFIG);

    for (const tableName of tableNames) {
        if (urlParams.has(tableName)) {
            const imageIid = urlParams.get(tableName);
            if (imageIid) {
                const photo = AppState.allPhotos.find(p => p.tableName === tableName && String(p.image_iid) === String(imageIid));

                if (photo) {
                    // Find index in display photos, or add if not present (though unlikely if initialized)
                    let index = AppState.displayPhotos.findIndex(p => p.id === photo.id);

                    if (index === -1) {
                        // If for some reason it's not in display photos (filter?), we can just force open it
                        // But for navigation context, it's better if it is in the list.
                        // For now, let's just open it with index -1 or try to find it.
                        console.warn('Deep linked photo not in current display list');
                    }

                    openModal(
                        photo.thumbnail_url,
                        photo.image_url,
                        photo.tableName,
                        photo.id,
                        photo.table_image_iid,
                        index !== -1 ? index : 0
                    );
                }
            }
            break; // Handle only one deep link
        }
    }
}

// ===========================================
// App Install Prompt (PWA)
// ===========================================
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
    // Prevent the mini-infobar from appearing on mobile
    e.preventDefault();
    // Stash the event so it can be triggered later.
    deferredPrompt = e;
});

function initInstallPrompt() {
    const installModal = document.getElementById('installModal');
    const closeBtn = document.getElementById('closeInstallModal');
    const installBtn = document.getElementById('installAppBtn');
    const iosInstruction = document.getElementById('iosInstallInstruction');
    const installActions = document.getElementById('installActions');

    if (!installModal) return;

    // Detect iOS
    const userAgent = window.navigator.userAgent || window.navigator.vendor || window.opera;
    const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
    // Detect Safari
    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

    // Show logic after 1 minute (60000ms)
    setTimeout(() => {
        // If already installed (standalone mode), don't show
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone || document.referrer.includes('android-app://');

        // Also check if already dismissed previously (optional, but good UX)
        const installDismissed = localStorage.getItem('chobirdeyal_install_dismissed');
        if (isStandalone || installDismissed) return;

        // Determine what to show
        if (isIOS) {
            // iOS Safari requires manual installation via Share > Add to Home Screen
            installActions.style.display = 'none';
            iosInstruction.style.display = 'block';
            showInstallModal(installModal);
        } else if (deferredPrompt) {
            // Android/Chrome supports native prompt
            installActions.style.display = 'flex';
            iosInstruction.style.display = 'none';
            showInstallModal(installModal);
        } else {
            // Fallback: If not iOS and no native prompt (e.g. Firefox, standard desktop)
            // We can just show a general message or hide the modal. 
            // We'll show the modal but change text if needed, or just show the button and let it fallback.
            installActions.style.display = 'flex';
            iosInstruction.style.display = 'none';
            if (!isSafari) {
                showInstallModal(installModal);
            }
        }
    }, 30000);

    if (closeBtn) {
        closeBtn.addEventListener('click', () => {
            hideInstallModal(installModal);
            localStorage.setItem('chobirdeyal_install_dismissed', 'true');
        });
    }

    if (installBtn) {
        installBtn.addEventListener('click', async () => {
            hideInstallModal(installModal);
            if (deferredPrompt) {
                // Show the install prompt
                deferredPrompt.prompt();
                // Wait for the user to respond to the prompt
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User response to the install prompt: ${outcome}`);
                // We've used the prompt, and can't use it again, throw it away
                deferredPrompt = null;
            } else {
                // Fallback instruction if button clicked but no deferredPrompt
                alert('Please use your browser menu to "Install App" or "Add to Home Screen".');
            }
        });
    }

    if (installModal) {
        installModal.addEventListener('click', (e) => {
            if (e.target === installModal) {
                hideInstallModal(installModal);
                localStorage.setItem('chobirdeyal_install_dismissed', 'true');
            }
        });
    }
}

function showInstallModal(modal) {
    if (modal) modal.classList.add('active');
}

function hideInstallModal(modal) {
    if (modal) modal.classList.remove('active');
}

// Initialize the install prompt logic on load
window.addEventListener('load', initInstallPrompt);
